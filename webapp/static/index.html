<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Requests & Tags Hub</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; background-color: var(--tg-theme-bg-color, #ffffff); color: var(--tg-theme-text-color, #000000); padding: 15px; margin: 0; }
        input { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #ccc; background: var(--tg-theme-secondary-bg-color); color: var(--tg-theme-text-color); box-sizing: border-box; margin-bottom: 15px;}
        .tag { display: inline-block; padding: 8px 12px; margin: 5px; border-radius: 15px; background-color: var(--tg-theme-secondary-bg-color); cursor: pointer; font-size: 14px;}
        .tag.selected { background-color: var(--tg-theme-button-color); color: white; }
        .tag.require { background-color: #4CAF50; color: white; } 
        .tag.exclude { background-color: #F44336; color: white; } 
        .tag.any { background-color: #2196F3; color: white; } 
        .section { margin-bottom: 20px; padding: 10px; border-radius: 10px; background: rgba(0,0,0,0.05); min-height: 50px;}
        .hidden { display: none !important; }
        h4 { margin-top: 0; margin-bottom: 10px; }
        #error-msg { font-size: 13px; margin-bottom: 10px; font-weight: bold; }

        /* Requests Styles */
        .tabs { display: flex; border-bottom: 2px solid var(--tg-theme-secondary-bg-color, rgba(0,0,0,0.05)); margin-bottom: 15px; }
        .tab-btn { flex: 1; padding: 12px; text-align: center; cursor: pointer; border-bottom: 3px solid transparent; font-weight: bold; background: none; border: none; color: var(--tg-theme-hint-color, #888888); font-size: 14px; }
        .tab-btn.active { border-bottom-color: var(--tg-theme-button-color, #2481cc); color: var(--tg-theme-text-color, #000); }
        .req-card { border: 1px solid var(--tg-theme-secondary-bg-color, rgba(0,0,0,0.05)); border-radius: 12px; padding: 15px; margin-bottom: 15px; background: rgba(0,0,0,0.02); }
        .req-status { font-weight: bold; margin-bottom: 8px; font-size: 13px; text-transform: uppercase; color: #FF9800; }
        .req-bio { font-style: italic; margin-bottom: 10px; color: var(--tg-theme-text-color); }
        .req-msg { background: rgba(0,0,0,0.04); padding: 8px; border-radius: 6px; margin-bottom: 10px; font-size: 13px; }
        .btn { display: inline-block; padding: 8px 16px; border-radius: 8px; border: none; font-size: 13px; cursor: pointer; font-weight: bold; margin-right: 5px; margin-top: 5px; }
        .btn-primary { background-color: var(--tg-theme-button-color, #2481cc); color: white; }
        .btn-secondary { background-color: #4CAF50; color: white; }
        .btn-danger { background-color: #F44336; color: white; }
        .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; z-index: 1000; }
        .modal-content { background: var(--tg-theme-bg-color, #fff); color: var(--tg-theme-text-color, #000); padding: 20px; border-radius: 12px; width: 90%; max-width: 400px; box-sizing: border-box; }
        .checkbox-row { display: flex; align-items: center; margin-bottom: 10px; cursor: pointer; }
        .checkbox-row input { width: auto; margin-right: 10px; margin-bottom: 0; }
    </style>
</head>
<body>
    <div id="tags-section">
        <h3 id="title"></h3>
        <p id="legend" style="font-size: 12px; color: gray;"></p>
        <p id="error-msg"></p>
        
        <div class="section" id="sel-section">
            <h4 id="h4-sel"></h4>
            <div id="selected-container"></div>
        </div>

        <input type="text" id="searchInput">
        
        <div class="section">
            <h4 id="h4-avail"></h4>
            <div id="available-container"></div>
        </div>
    </div>

    <!-- REQUESTS HUB SECTION -->
    <div id="requests-section" class="hidden">
        <h3 id="req-title"></h3>
        <p id="req-legend" style="font-size: 12px; color: gray; margin-bottom: 15px;"></p>
        
        <div class="tabs">
            <button class="tab-btn active" id="tab-received" onclick="switchTab('received')"></button>
            <button class="tab-btn" id="tab-sent" onclick="switchTab('sent')"></button>
        </div>

        <input type="text" id="reqSearchInput">
        <div id="requests-list"></div>
    </div>

    <!-- EXCHANGING MODAL OVERLAY -->
    <div id="modal-overlay" class="modal-overlay hidden">
        <div class="modal-content">
            <h4 id="modal-title"></h4>
            <p id="modal-desc" style="font-size: 12px; color: gray; margin-bottom: 15px;"></p>
            <div id="checkboxes-container"></div>
            <div style="display: flex; justify-content: flex-end; margin-top: 15px;">
                <button class="btn btn-primary" id="modal-confirm-btn" onclick="submitModal()"></button>
                <button class="btn btn-danger" id="modal-cancel-btn" onclick="closeModal()"></button>
            </div>
        </div>
    </div>

    <!-- CUSTOM NON-ALERT INTERFACE OVERLAY (Hides hosting domains) -->
    <div id="custom-dialog-overlay" class="modal-overlay hidden" style="z-index: 1100;">
        <div class="modal-content" style="text-align: center;">
            <h4 id="dialog-title" style="margin-bottom: 10px;"></h4>
            <p id="dialog-text" style="font-size: 14px; color: var(--tg-theme-text-color, #000); margin-bottom: 20px;"></p>
            <div style="display: flex; justify-content: center; gap: 10px;">
                <button class="btn btn-primary" id="dialog-ok-btn"></button>
                <button class="btn btn-danger hidden" id="dialog-cancel-btn"></button>
            </div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp; tg.expand();
        const urlParams = new URLSearchParams(window.location.search);
        const mode = urlParams.get('mode') || 'edit';
        const profile_id = urlParams.get('profile_id');
        const lang = urlParams.get('lang') || 'en';
        
        const I18N = {
            en: {
                edit_title: "Edit Profile Tags", filter_title: "Advanced Filter",
                edit_leg: "Tap to select.", filt_leg: "Tap: 🟩 Must have | 🟥 Exclude | 🟦 Any",
                sel_active: "Selected / Active", avail: "Available", search_tag: "Search tags...",
                save: "Save & Apply", req_t: "Pending Requests", req_l: "Manage your mutual/one-way requests.",
                tab_r: "📥 Received", tab_s: "📤 Sent", req_search: "Search across tags, bio, contacts...",
                no_req: "No pending requests.", bio_emp: "<i>No bio set.</i>", pub_c: "<b>Public Contacts:</b>",
                msg: "<b>Message:</b>", btn_v: "👁️ Mark as Viewed", btn_a: "✅ Accept & Exchange",
                btn_d: "❌ Decline", wait: "Waiting for response...", 
                ow_share: "ONE-WAY SHARE", mut_req: "MUTUAL EXCHANGE", shr_prv: "<b>Shared Private Contacts:</b>",
                m_t: "Accept & Exchange", m_d: "Choose contacts to exchange:",
                m_warn: "⚠️ No private contacts to share. Add one via bot first.",
                m_c: "Confirm", m_x: "Cancel", err: "An error occurred.",
                al_sel: "Select at least one contact to share.", al_dec: "Decline this request?", al_v: "Mark this request as viewed? It will be removed from this list.",
                info: "Alert", confirm_action: "Confirmation"
            },
            ru: {
                edit_title: "Редактировать теги", filter_title: "Фильтры",
                edit_leg: "Нажмите для выбора.", filt_leg: "Нажатие: 🟩 Обязательно | 🟥 Исключить | 🟦 Любой",
                sel_active: "Выбранные", avail: "Доступные", search_tag: "Поиск тегов...",
                save: "Сохранить", req_t: "Активные запросы", req_l: "Управление вашими запросами.",
                tab_r: "📥 Полученные", tab_s: "📤 Отправленные", req_search: "Поиск по био, тегам, ID...",
                no_req: "Запросов пока нет.", bio_emp: "<i>О себе не заполнено.</i>", pub_c: "<b>Публичные:</b>",
                msg: "<b>Сообщение:</b>", btn_v: "👁️ Отметить просмотренным", btn_a: "✅ Принять обмен",
                btn_d: "❌ Отклонить", wait: "Ожидание ответа...", 
                ow_share: "ОДНОСТОРОННЯЯ ОТПРАВКА", mut_req: "ЗАПРОС НА ОБМЕН", shr_prv: "<b>Переданные контакты:</b>",
                m_t: "Принять обмен", m_d: "Выберите контакты для передачи:",
                m_warn: "⚠️ Нет приватных контактов. Сначала добавьте их в боте.",
                m_c: "Подтвердить", m_x: "Отмена", err: "Произошла ошибка.",
                al_sel: "Выберите хотя бы один контакт для обмена.", al_dec: "Отклонить этот запрос?", al_v: "Удалить этот запрос из списка?",
                info: "Внимание", confirm_action: "Подтверждение"
            },
            pt: {
                edit_title: "Editar Tags do Perfil", filter_title: "Filtro Avançado",
                edit_leg: "Toque para selecionar.", filt_leg: "Toque: 🟩 Obrigatório | 🟥 Excluir | 🟦 Qualquer",
                sel_active: "Selecionado / Ativo", avail: "Disponível", search_tag: "Buscar tags...",
                save: "Salvar & Aplicar", req_t: "Solicitações Pendentes", req_l: "Gerencie suas solicitações mútuas/unidirecionais.",
                tab_r: "📥 Recebidas", tab_s: "📤 Enviadas", req_search: "Buscar por tags, bio, contatos...",
                no_req: "Nenhuma solicitação pendente.", bio_emp: "<i>Nenhuma biografia definida.</i>", pub_c: "<b>Contatos Públicos:</b>",
                msg: "<b>Mensagem:</b>", btn_v: "👁️ Marcar como Visualizada", btn_a: "✅ Aceitar & Trocar",
                btn_d: "❌ Recusar", wait: "Aguardando resposta...", 
                ow_share: "COMPARTILHAMENTO UNIDIRECIONAL", mut_req: "SOLICITAÇÃO DE TROCA", shr_prv: "<b>Contatos Privados Compartilhados:</b>",
                m_t: "Aceitar & Trocar", m_d: "Escolha os contatos para trocar:",
                m_warn: "⚠️ Nenhum contato privado para compartilhar. Adicione um primeiro no bot.",
                m_c: "Confirmar", m_x: "Cancelar", err: "Ocorreu um erro.",
                al_sel: "Selecione pelo menos um contato para compartilhar.", al_dec: "Recusar esta solicitação?", al_v: "Marcar esta solicitação como visualizada? Ela será removida desta lista.",
                info: "Alerta", confirm_action: "Confirmação"
            }
        };
        const _i = (k) => I18N[lang][k] || I18N['en'][k];

        let allTags = {{AVAILABLE_TAGS_JSON}}; 
        let stateMap = {};

        // Requests variables
        let sentRequests = [];
        let receivedRequests = [];
        let myPrivateContacts = [];
        let currentTab = 'received';
        let modalReqId = '';

        // --- Custom Dialog System to completely replace native alert/confirm and block domain exposure ---
        function showCustomAlert(text, onOk) {
            document.getElementById('dialog-title').innerText = _i('info');
            document.getElementById('dialog-text').innerText = text;
            
            const okBtn = document.getElementById('dialog-ok-btn');
            okBtn.innerText = "OK";
            okBtn.onclick = () => {
                document.getElementById('custom-dialog-overlay').classList.add('hidden');
                if (onOk) onOk();
            };
            
            document.getElementById('dialog-cancel-btn').classList.add('hidden');
            document.getElementById('custom-dialog-overlay').classList.remove('hidden');
        }

        function showCustomConfirm(text, onOk, onCancel) {
            document.getElementById('dialog-title').innerText = _i('confirm_action');
            document.getElementById('dialog-text').innerText = text;
            
            const okBtn = document.getElementById('dialog-ok-btn');
            okBtn.innerText = _i('m_c');
            okBtn.onclick = () => {
                document.getElementById('custom-dialog-overlay').classList.add('hidden');
                if (onOk) onOk();
            };
            
            const cancelBtn = document.getElementById('dialog-cancel-btn');
            cancelBtn.innerText = _i('m_x');
            cancelBtn.classList.remove('hidden');
            cancelBtn.onclick = () => {
                document.getElementById('custom-dialog-overlay').classList.add('hidden');
                if (onCancel) onCancel();
            };
            
            document.getElementById('custom-dialog-overlay').classList.remove('hidden');
        }

        // --- Confirm button disabler if no private contact is checked ---
        function updateModalButtonState() {
            const selectedBoxes = document.querySelectorAll('input[name="private_contact"]:checked');
            const confirmBtn = document.getElementById('modal-confirm-btn');
            if (selectedBoxes.length === 0 && Array.isArray(myPrivateContacts) && myPrivateContacts.length > 0) {
                confirmBtn.disabled = true;
                confirmBtn.style.opacity = '0.5';
                confirmBtn.style.cursor = 'not-allowed';
            } else {
                confirmBtn.disabled = false;
                confirmBtn.style.opacity = '1';
                confirmBtn.style.cursor = 'pointer';
            }
        }

        function setUI() {
            if(mode === 'edit') {
                document.getElementById('title').innerText = _i('edit_title');
                document.getElementById('legend').innerText = _i('edit_leg');
            } else if (mode === 'filter') {
                document.getElementById('title').innerText = _i('filter_title');
                document.getElementById('legend').innerText = _i('filt_leg');
            }
            document.getElementById('h4-sel').innerText = _i('sel_active');
            document.getElementById('h4-avail').innerText = _i('avail');
            document.getElementById('searchInput').placeholder = _i('search_tag');
            document.getElementById('req-title').innerText = _i('req_t');
            document.getElementById('req-legend').innerText = _i('req_l');
            document.getElementById('tab-received').innerText = _i('tab_r');
            document.getElementById('tab-sent').innerText = _i('tab_s');
            document.getElementById('reqSearchInput').placeholder = _i('req_search');
            document.getElementById('modal-title').innerText = _i('m_t');
            document.getElementById('modal-desc').innerText = _i('m_d');
            document.getElementById('modal-confirm-btn').innerText = _i('m_c');
            document.getElementById('modal-cancel-btn').innerText = _i('m_x');
        }

        async function init() {
            setUI();
            if (mode === 'requests') {
                document.getElementById('tags-section').classList.add('hidden');
                document.getElementById('requests-section').classList.remove('hidden');
                await loadRequests();
                return;
            }

            allTags.forEach(t => stateMap[t.id] = 0);
            try {
                let pRes = await fetch('/api/get_profile_data', { 
                    method: 'POST', 
                    headers: {'Content-Type': 'application/json'}, 
                    body: JSON.stringify({ initData: tg.initData, profile_id: profile_id, mode: mode }) 
                });
                
                if (pRes.ok) {
                    let pData = await pRes.json();
                    if(mode === 'edit') { 
                        pData.tags.forEach(t => { if(t in stateMap) stateMap[t] = 1; }); 
                    } else {
                        let f = pData.filters;
                        if(f.require_tags) f.require_tags.forEach(t => { if(t in stateMap) stateMap[t] = 1; });
                        if(f.exclude_tags) f.exclude_tags.forEach(t => { if(t in stateMap) stateMap[t] = 2; });
                        if(f.any_tags) f.any_tags.forEach(t => { if(t in stateMap) stateMap[t] = 3; });
                    }
                }
            } catch (e) { console.error(e); }
            renderTags();
        }

        function renderTags() {
            const selCont = document.getElementById('selected-container');
            const availCont = document.getElementById('available-container');
            selCont.innerHTML = ''; availCont.innerHTML = '';

            allTags.forEach(tag => {
                const el = document.createElement('div');
                const tDisp = tag.display[lang] || tag.display['en'];
                const tAlias = (tag.aliases[lang] || tag.aliases['en']).join(' ').toLowerCase();
                
                el.innerText = tDisp; 
                el.dataset.aliases = tAlias;
                el.className = 'tag';
                let st = stateMap[tag.id];
                
                if(mode === 'edit' && st === 1) el.classList.add('selected');
                else if(mode === 'filter') {
                    if(st === 1) el.classList.add('require');
                    if(st === 2) el.classList.add('exclude');
                    if(st === 3) el.classList.add('any');
                }

                el.onclick = () => {
                    if(mode === 'edit') stateMap[tag.id] = st === 1 ? 0 : 1;
                    else stateMap[tag.id] = (st + 1) % 4;
                    tg.MainButton.setText(_i('save')); tg.MainButton.show();
                    renderTags(); 
                };

                if(st !== 0) selCont.appendChild(el); else availCont.appendChild(el);
            });
        }

        document.getElementById('searchInput').addEventListener('input', (e) => {
            const q = e.target.value.toLowerCase();
            document.getElementById('available-container').querySelectorAll('.tag').forEach(el => {
                if(el.innerText.toLowerCase().includes(q) || el.dataset.aliases.includes(q)) el.classList.remove('hidden');
                else el.classList.add('hidden');
            });
        });

        tg.MainButton.onClick(async () => {
            if (mode === 'requests') return;
            let pay = { initData: tg.initData, mode: mode, profile_id: profile_id };
            if(mode === 'edit') pay.tags = Object.keys(stateMap).filter(k => stateMap[k] === 1);
            else {
                pay.require_tags = Object.keys(stateMap).filter(k => stateMap[k] === 1);
                pay.exclude_tags = Object.keys(stateMap).filter(k => stateMap[k] === 2);
                pay.any_tags = Object.keys(stateMap).filter(k => stateMap[k] === 3);
            }
            await fetch('/api/update', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(pay) });
            tg.close();
        });

        async function loadRequests() {
            try {
                let res = await fetch('/api/get_requests', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ initData: tg.initData })
                });
                if (res.ok) {
                    let data = await res.json();
                    sentRequests = data.sent_requests || [];
                    receivedRequests = data.received_requests || [];
                    myPrivateContacts = data.my_private_contacts || [];
                    renderRequests();
                } else {
                    document.getElementById('requests-list').innerHTML = `<p style='color:red;'>${_i('err')}</p>`;
                }
            } catch (e) {
                document.getElementById('requests-list').innerHTML = `<p style='color:red;'>${_i('err')}</p>`;
            }
        }

        function switchTab(tab) {
            currentTab = tab;
            document.getElementById('tab-received').classList.toggle('active', tab === 'received');
            document.getElementById('tab-sent').classList.toggle('active', tab === 'sent');
            renderRequests();
        }

        function renderRequests() {
            const listContainer = document.getElementById('requests-list');
            listContainer.innerHTML = '';
            
            const q = document.getElementById('reqSearchInput').value.toLowerCase();
            const list = currentTab === 'received' ? receivedRequests : sentRequests;
            
            const filtered = list.filter(r => {
                const otherProf = r.other_profile || {};
                const bio = (otherProf.bio || '').toLowerCase();
                const tags = Array.isArray(otherProf.tags) ? otherProf.tags.map(t => `#${t}`).join(' ').toLowerCase() : '';
                const pUuid = (otherProf.public_uuid || '').toLowerCase();
                const publicCon = Array.isArray(otherProf.public_contacts) ? otherProf.public_contacts.join(' ').toLowerCase() : '';
                const msg = (r.message || '').toLowerCase();
                const sharedCon = Array.isArray(r.shared_contacts) ? r.shared_contacts.join(' ').toLowerCase() : '';
                const reqTypeLabel = (r.action === 'send' ? _i('ow_share') : _i('mut_req')).toLowerCase();
                
                return bio.includes(q) || tags.includes(q) || pUuid.includes(q) || publicCon.includes(q) || msg.includes(q) || sharedCon.includes(q) || reqTypeLabel.includes(q);
            });
            
            if (filtered.length === 0) {
                listContainer.innerHTML = `<p style="text-align:center; color:gray; margin-top:20px;">${_i('no_req')}</p>`;
                return;
            }
            
            filtered.forEach(r => {
                const card = document.createElement('div');
                card.className = 'req-card';
                
                const otherProf = r.other_profile || {};
                
                let translatedTags = [];
                if (Array.isArray(otherProf.tags)) {
                    otherProf.tags.forEach(tid => {
                        const tagDef = allTags.find(x => x.id === tid);
                        if(tagDef) translatedTags.push(tagDef.display[lang] || tagDef.display['en']);
                        else translatedTags.push(tid);
                    });
                }
                let tagsHtml = translatedTags.map(t => `#${t}`).join(' ');

                let publicContactsHtml = Array.isArray(otherProf.public_contacts) ? otherProf.public_contacts.map(c => `• <code>${escapeHtml(c)}</code>`).join('<br>') : '';
                let messageBlock = r.message ? `<div class="req-msg">${_i('msg')} ${escapeHtml(r.message)}</div>` : '';
                
                let buttonsHtml = '';
                if (currentTab === 'received') {
                    if (r.action === 'send') {
                        buttonsHtml = `<button class="btn btn-primary" onclick="handleActionNoModal('viewed', '${r.req_id}')">${_i('btn_v')}</button>`;
                    } else {
                        buttonsHtml = `
                            <button class="btn btn-secondary" onclick="openModal('${r.req_id}')">${_i('btn_a')}</button>
                            <button class="btn btn-danger" onclick="handleActionNoModal('decline', '${r.req_id}')">${_i('btn_d')}</button>
                        `;
                    }
                } else {
                    buttonsHtml = `<span style="font-size:12px; color:gray;">${_i('wait')}</span>`;
                }

                let reqTypeLabel = r.action === 'send' ? _i('ow_share') : _i('mut_req');
                let reqTypeColor = r.action === 'send' ? '#2196F3' : '#FF9800';

                let sharedContactsHtml = '';
                if (r.action === 'send' && Array.isArray(r.shared_contacts) && r.shared_contacts.length > 0) {
                    sharedContactsHtml = `<div style="font-size:13px; margin-bottom:10px; background: rgba(33, 150, 243, 0.1); padding: 8px; border-radius: 6px;">
                        ${_i('shr_prv')}<br>${r.shared_contacts.map(c => `• <code>${escapeHtml(c)}</code>`).join('<br>')}
                    </div>`;
                }

                card.innerHTML = `
                    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
                        <span style="font-weight:bold; font-size:14px;">ID: ${escapeHtml(otherProf.public_uuid || '')}</span>
                        <span class="req-status" style="color:${reqTypeColor};">${reqTypeLabel}</span>
                    </div>
                    <p class="req-bio">${otherProf.bio ? escapeHtml(otherProf.bio) : _i('bio_emp')}</p>
                    <div style="font-size:12px; color:gray; margin-bottom:10px;">${escapeHtml(tagsHtml)}</div>
                    ${publicContactsHtml ? `<div style="font-size:13px; margin-bottom:10px;">${_i('pub_c')}<br>${publicContactsHtml}</div>` : ''}
                    ${sharedContactsHtml}
                    ${messageBlock}
                    <div style="margin-top:12px;">${buttonsHtml}</div>
                `;
                listContainer.appendChild(card);
            });
        }

        function openModal(reqId) {
            modalReqId = reqId;
            const checkboxesContainer = document.getElementById('checkboxes-container');
            checkboxesContainer.innerHTML = '';
            
            if (!Array.isArray(myPrivateContacts) || myPrivateContacts.length === 0) {
                checkboxesContainer.innerHTML = `<p style="color:red; font-size:13px; font-weight:bold;">${_i('m_warn')}</p>`;
                document.getElementById('modal-confirm-btn').classList.add('hidden');
            } else {
                document.getElementById('modal-confirm-btn').classList.remove('hidden');
                myPrivateContacts.forEach(c => {
                    const row = document.createElement('label');
                    row.className = 'checkbox-row';
                    row.innerHTML = `<input type="checkbox" name="private_contact" value="${escapeHtml(c.id || '')}" onchange="updateModalButtonState()"> <span>${escapeHtml(c.value || '')}</span>`;
                    checkboxesContainer.appendChild(row);
                });
            }
            updateModalButtonState();
            document.getElementById('modal-overlay').classList.remove('hidden');
        }

        function closeModal() { document.getElementById('modal-overlay').classList.add('hidden'); }

        async function submitModal() {
            const selectedBoxes = document.querySelectorAll('input[name="private_contact"]:checked');
            if (selectedBoxes.length === 0 && Array.isArray(myPrivateContacts) && myPrivateContacts.length > 0) {
                showCustomAlert(_i('al_sel')); return;
            }
            try {
                let res = await fetch('/api/handle_request', {
                    method: 'POST', headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ initData: tg.initData, req_id: modalReqId, action: 'accept', selected_contact_ids: Array.from(selectedBoxes).map(b => b.value) })
                });
                if (res.ok) { closeModal(); await loadRequests(); } 
                else {
                    let err = await res.json();
                    showCustomAlert(err.detail || _i('err'));
                }
            } catch (e) { showCustomAlert(_i('err')); }
        }

        async function handleActionNoModal(action, reqId) {
            let msg = action === 'decline' ? _i('al_dec') : (action === 'viewed' ? _i('al_v') : "");
            if (msg) {
                showCustomConfirm(msg, async () => {
                    await executeAction(action, reqId);
                });
            } else {
                await executeAction(action, reqId);
            }
        }

        async function executeAction(action, reqId) {
            try {
                let res = await fetch('/api/handle_request', {
                    method: 'POST', headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ initData: tg.initData, req_id: reqId, action: action })
                });
                if (res.ok) await loadRequests(); 
                else {
                    let err = await res.json();
                    showCustomAlert(err.detail || _i('err'));
                }
            } catch (e) { showCustomAlert(_i('err')); }
        }

        document.getElementById('reqSearchInput').addEventListener('input', () => { renderRequests(); });
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;");
        }
        init();
    </script>
</body>
</html>
